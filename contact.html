<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Get in touch with Nihal through an accessible contact form.">
  <title>Contact | Nihal</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/style.css">

</head>
<body>
  <a href="#main-content" class="skip-link">Skip to content</a>
  <header role="banner">
    <nav aria-label="Main navigation">
      <ul>
        <li><a href="index.html">Home</a></li>
        <li><a href="about.html">About</a></li>
        <li><a href="projects.html">Projects</a></li>
        <li><a href="contact.html" aria-current="page">Contact</a></li>
      </ul>
    </nav>
  </header>

  <main id="main-content" role="main">
    <section aria-labelledby="contact-title">
      <h1 id="contact-title">Contact Me</h1>
      <form action="#" method="post" aria-label="Contact form">
        <div id="form-errors" aria-live="polite"></div>

        <label for="name">Name:</label>
        <input id="name" name="name" type="text" required aria-required="true">

        <label for="email">Email:</label>
        <input id="email" name="email" type="email" required aria-required="true">

        <label for="message">Message:</label>
        <textarea id="message" name="message" rows="5" required aria-required="true"></textarea>

        <button type="submit">Send</button>
      </form>
    </section>
  </main>

  <footer role="contentinfo">
    <p>&copy; 2026 Nihal. All rights reserved.</p>
  </footer>
</body>
</html>
